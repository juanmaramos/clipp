name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - appcast.xml
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: macos-latest
    env:
      SIGNING_IDENTITY: Developer ID Application

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Determine Release Metadata
        run: |
          MARKETING_VERSION=$(
            xcodebuild \
              -project Maccy.xcodeproj \
              -scheme Clipp \
              -configuration Release \
              -showBuildSettings | awk -F ' = ' '/MARKETING_VERSION = / {print $2; exit}'
          )

          if [ -z "$MARKETING_VERSION" ]; then
            echo "❌ Unable to determine MARKETING_VERSION"
            exit 1
          fi

          BUILD_VERSION="${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${MARKETING_VERSION}-build.${BUILD_VERSION}"
          RELEASE_NAME="Clipp ${MARKETING_VERSION} (build ${BUILD_VERSION})"

          echo "MARKETING_VERSION=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=$BUILD_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$RELEASE_NAME" >> "$GITHUB_ENV"

          echo "📌 Release tag: $RELEASE_TAG"
          echo "📌 App version: $MARKETING_VERSION ($BUILD_VERSION)"

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Import Developer ID Application certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm certificate.p12

      - name: Build Clipp
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcodebuild \
            -project Maccy.xcodeproj \
            -scheme Clipp \
            -configuration Release \
            -derivedDataPath build \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

          echo "✅ Build completed"
          ls -lh build/Build/Products/Release/

      - name: Notarize Clipp
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Clipp.app"
          APP_BINARY="$APP_PATH/Contents/MacOS/Clipp"
          SPARKLE_FRAMEWORK="$APP_PATH/Contents/Frameworks/Sparkle.framework"

          # Re-sign Sparkle internals to ensure every nested binary has
          # hardened runtime and secure timestamp with Developer ID identity.
          if [ -d "$SPARKLE_FRAMEWORK" ]; then
            while IFS= read -r executable; do
              codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp "$executable"
            done < <(find "$SPARKLE_FRAMEWORK" -type f -perm -111 | sort -r)

            while IFS= read -r bundle; do
              codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp "$bundle"
            done < <(find "$SPARKLE_FRAMEWORK" -type d \( -name "*.xpc" -o -name "*.app" -o -name "*.framework" \) | sort -r)
          fi

          # Re-sign app bundle last (inside-out order).
          codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp \
            --entitlements Maccy/Maccy.entitlements \
            "$APP_PATH"

          # Release notarization builds must not include debug entitlement.
          ENTITLEMENTS=$(codesign -d --entitlements :- "$APP_BINARY" 2>/dev/null || true)
          if echo "$ENTITLEMENTS" | grep -q "<key>com.apple.security.get-task-allow</key>"; then
            echo "❌ com.apple.security.get-task-allow found in release app signature"
            exit 1
          fi

          # Verify the app is properly signed
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✅ Code signature verified"

          # Zip for notarization (ditto preserves extended attributes)
          ditto -c -k --keepParent "$APP_PATH" Clipp-notarize.zip

          # Submit to Apple and wait (usually 1-3 minutes)
          xcrun notarytool submit Clipp-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json > notary-result.json

          SUBMISSION_ID=$(/usr/bin/plutil -extract id raw -o - notary-result.json)
          NOTARY_STATUS=$(/usr/bin/plutil -extract status raw -o - notary-result.json)
          echo "Notary submission: $SUBMISSION_ID ($NOTARY_STATUS)"

          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$TEAM_ID" > notary-log.json || true
            cat notary-log.json || true
            echo "❌ Notarization rejected"
            exit 1
          fi

          # Staple the notarization ticket to the app bundle
          xcrun stapler staple "$APP_PATH"
          echo "✅ Notarization complete and ticket stapled"

          rm Clipp-notarize.zip notary-result.json notary-log.json 2>/dev/null || true

      - name: Create Distribution Package
        run: |
          PRODUCT_DIR="build/Build/Products/Release"
          APP_NAME="Clipp.app"
          APP_PATH="$PRODUCT_DIR/$APP_NAME"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App bundle not found at $APP_PATH"
            exit 1
          fi

          # Create a clean zip
          (
            cd "$PRODUCT_DIR"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$GITHUB_WORKSPACE/Clipp.zip"
          )

          # Create DMG
          STAGE_DIR="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          hdiutil create -volname "Clipp" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$GITHUB_WORKSPACE/Clipp.dmg"
          rm -rf "$STAGE_DIR"

          echo "📦 Created Clipp.zip and Clipp.dmg for $RELEASE_NAME"

          # Calculate checksums
          shasum -a 256 Clipp.zip > Clipp.zip.sha256
          shasum -a 256 Clipp.dmg > Clipp.dmg.sha256

          ls -lh Clipp.zip
          ls -lh Clipp.dmg
          cat Clipp.zip.sha256
          cat Clipp.dmg.sha256

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clipp-${{ env.RELEASE_TAG }}
          path: |
            Clipp.zip
            Clipp.dmg
            Clipp.zip.sha256
            Clipp.dmg.sha256
          retention-days: 30

      - name: Sign Update for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=""

          # Prefer the tool from the same derived data path used by xcodebuild.
          while IFS= read -r candidate; do
            if [ -x "$candidate" ]; then
              SIGN_UPDATE="$candidate"
              break
            fi
          done < <(find build/SourcePackages -type f -name sign_update 2>/dev/null)

          # Backward-compatible fallback for legacy DerivedData layout.
          if [ -z "$SIGN_UPDATE" ]; then
            SIGN_UPDATE=$(ls /Users/runner/Library/Developer/Xcode/DerivedData/*/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update 2>/dev/null | head -1)
          fi

          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found in DerivedData, downloading Sparkle tools..."
            SPARKLE_VERSION="2.7.5"
            curl -fL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
            mkdir -p sparkle_tools && tar -xf sparkle.tar.xz -C sparkle_tools
            SIGN_UPDATE=$(find sparkle_tools -type f -name sign_update | head -1)
          fi

          if [ -z "$SIGN_UPDATE" ] || [ ! -x "$SIGN_UPDATE" ]; then
            echo "❌ Unable to locate executable sign_update tool"
            exit 1
          fi

          # Write private key to temp file
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_private_key

          SIGNATURE=$("$SIGN_UPDATE" Clipp.zip --account clipp -f /tmp/sparkle_private_key 2>/dev/null || "$SIGN_UPDATE" Clipp.zip -f /tmp/sparkle_private_key)
          rm /tmp/sparkle_private_key

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> $GITHUB_ENV
          echo "✅ Sparkle signature generated"

      - name: Create Release Tag
        run: |
          git fetch --tags --force

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
            if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
              echo "❌ Tag $RELEASE_TAG already exists on $TAG_COMMIT"
              exit 1
            fi

            echo "ℹ️ Tag $RELEASE_TAG already points to $GITHUB_SHA"
            exit 0
          fi

          git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "$RELEASE_NAME"
          git push origin "$RELEASE_TAG"
          echo "✅ Created tag $RELEASE_TAG"

      - name: Prepare Release Notes
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          {
            echo "RELEASE_BODY<<EOF"
            echo "## ${RELEASE_NAME}"
            echo
            echo 'Download `Clipp.zip`, extract, and move `Clipp.app` to your Applications folder.'
            echo
            echo "### SHA-256 Checksum"
            echo
            echo '```'
            cat Clipp.zip.sha256
            cat Clipp.dmg.sha256
            echo '```'
            echo
            echo "### Changes"
            echo
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${DEFAULT_BRANCH}/CHANGELOG.md) for details."
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          target_commitish: ${{ github.sha }}
          files: |
            Clipp.zip
            Clipp.dmg
            Clipp.zip.sha256
            Clipp.dmg.sha256
          body: ${{ env.RELEASE_BODY }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Appcast
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          APP_PATH="build/Build/Products/Release/Clipp.app"
          BUILD_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Contents/Info.plist")
          ZIP_LENGTH=$(stat -f%z Clipp.zip)
          PUB_DATE=$(LC_ALL=C date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/Clipp.zip"
          RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Clipp</title>
              <link>https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${DEFAULT_BRANCH}/appcast.xml</link>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>${RELEASE_NAME}</title>
                <description>
                  <![CDATA[
                    <ul>
                      <li>See CHANGELOG for details.</li>
                    </ul>
                  ]]>
                </description>
                <pubDate>${PUB_DATE}</pubDate>
                <releaseNotesLink>${RELEASE_NOTES_URL}</releaseNotesLink>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${BUILD_VERSION}"
                  sparkle:shortVersionString="${MARKETING_VERSION}"
                  sparkle:edSignature="${SPARKLE_SIGNATURE}"
                  length="${ZIP_LENGTH}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "ℹ️ appcast.xml already up to date"
            exit 0
          fi

          git commit -m "Update appcast for ${RELEASE_TAG} [skip ci]"
          git fetch origin "${DEFAULT_BRANCH}"
          git rebase "origin/${DEFAULT_BRANCH}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
